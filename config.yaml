# PrivescMonitor configuration (skeleton — expand in later steps)

daemon:
  scan_interval_seconds: 60
  db_path: privesc_monitor.db

telegram:
  enabled: false
  # Set via local config / secrets manager — never commit real values
  bot_token: ""
  chat_id: ""
  max_alerts_per_minute: 10

detectors:
  enabled:
    - suid_check
    - sudoers_check
    - cron_check
  suid_check:
    scan_paths:
      - /usr/bin
      - /usr/sbin
      - /bin
      - /sbin
      - /usr/local/bin
  sudoers_check:
    watch_files:
      - /etc/sudoers
    watch_dirs:
      - /etc/sudoers.d
  cron_check:
    watch_files:
      - /etc/crontab
    watch_dirs:
      - /etc/cron.d
      - /var/spool/cron
    recursive: true
  capability_check:
    scan_roots:
      - /usr
      - /bin
      - /sbin
      - /usr/local
    timeout_seconds: 60
  audit_parser:
    log_path: /var/log/audit/audit.log
    poll_interval_seconds: 0.5
    watch_keys:
      priv_esc_root:
        severity: critical
        label: "Privilege escalation to root"
      sudoers_change:
        severity: high
        label: "sudoers policy changed"
      cron_change:
        severity: high
        label: "Cron job file changed"
      suid_change:
        severity: high
        label: "SUID/SGID bit changed"
      capset_usage:
        severity: high
        label: "capset() syscall (capability grant)"
      uid_change:
        severity: medium
        label: "UID-change syscall"
      module_insertion:
        severity: critical
        label: "Kernel module insertion"

logging:
  level: INFO
  file: logs/privesc_monitor.log
  max_bytes: 1048576
  backup_count: 5
