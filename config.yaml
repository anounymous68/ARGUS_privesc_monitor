# PrivescMonitor configuration (skeleton — expand in later steps)

daemon:
  scan_interval_seconds: 60
  db_path: privesc_monitor.db

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""

detectors:
  # Detectors registered in later steps
  enabled:
    - suid_check
  suid_check:
    scan_paths:
      - /usr/bin
      - /usr/sbin
      - /bin
      - /sbin
      - /usr/local/bin

logging:
  level: INFO
