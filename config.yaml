# PrivescMonitor configuration (skeleton — expand in later steps)

daemon:
  scan_interval_seconds: 60
  db_path: privesc_monitor.db

telegram:
  enabled: false
  # Set via local config / secrets manager — never commit real values
  bot_token: ""
  chat_id: ""
  max_alerts_per_minute: 10

detectors:
  enabled:
    - suid_check
    - sudoers_check
    - cron_check
  suid_check:
    scan_paths:
      - /usr/bin
      - /usr/sbin
      - /bin
      - /sbin
      - /usr/local/bin
  sudoers_check:
    watch_files:
      - /etc/sudoers
    watch_dirs:
      - /etc/sudoers.d
  cron_check:
    watch_files:
      - /etc/crontab
    watch_dirs:
      - /etc/cron.d
      - /var/spool/cron
    recursive: true

logging:
  level: INFO
